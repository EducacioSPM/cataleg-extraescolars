<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catàleg d'activitats extraescolars</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header id="header">

    <div class="container">

        <h1>Activitats extraescolars 2026-2027</h1>

    </div>

</header>

    <main>

        <section id="hero">

    <div class="container hero-content">

        <h2>Troba l'activitat que millor s'adapta al teu fill o filla</h2>

        <input
            type="text"
            id="search"
            placeholder="Cerca per activitat, entitat o categoria...">

    </div>

</section>

        <section id="catalog">

            <aside id="filters">

    <h3>Filtres</h3>

    <label>Categoria</label>
    <select id="filterCategoria">
        <option value="">Totes</option>
    </select>

    <label>Subcategoria</label>
<select id="filterSubCategoria">
    <option value="">Totes</option>
</select>

    <label>Organitzador</label>
    <select id="filterOrganitzador">
        <option value="">Tots</option>
    </select>

    <label>Any de naixement</label>
    <input type="number" id="filterAny" placeholder="Ex. 2017">

</aside>

            <section id="results">

                <div id="results-header">

    <h2 id="numResultats"></h2>

</div>

                <div id="cards-container"></div>

            </section>

        </section>

    </main>

    <footer id="footer"></footer>

    <script src="js/cards.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/app.js"></script>

<div id="modal" class="modal ocult">

    <div class="modal-content">

        <span id="tancarModal">&times;</span>

        <div id="modalBody"></div>

    </div>

</div>    

</body>
</html>
