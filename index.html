<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catàleg d'activitats extraescolars</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header id="header">

    <div class="container header-content">

        <img
            src="assets/logos/Escut_dreta_Ajuntament_blau.jpg"
            alt="Ajuntament de Santa Perpètua"
            class="logo-ajuntament">

        <h1>Activitats Foraescola a Santa Perpètua de Mogoda. Curs 2026-2027</h1>

    </div>

</header>
    

    <main>

        <section id="hero">

    <div class="container hero-content">

        <div class="hero-text">

            <h2>Troba l'activitat que t'agradaria fer</h2>

            <input
                type="text"
                id="search"
                placeholder="Cerca per activitat, entitat o categoria...">

        </div>

        <img
            src="assets/logos/Gloria.png"
            alt="Il·lustració activitats extraescolars"
            class="hero-illustration">

    </div>

</section>

        <section id="catalog">

            <aside id="filters">

    <h3 id="filtersToggle">Filtres ▼</h3>

    <div id="filtersContent">
    
    <label>Categoria</label>
    <select id="filterCategoria">
        <option value="">Totes</option>
    </select>

    <label>Subcategoria</label>
<select id="filterSubCategoria">
    <option value="">Totes</option>
</select>

    <label>Organitzador</label>
    <select id="filterOrganitzador">
        <option value="">Tots</option>
    </select>

     <label>Ubicació</label>
    <select id="filterUbicacio">
        <option value="">Totes</option>
    </select>

    <label>Any de naixement</label>
    <input type="number" id="filterAny" placeholder="Ex. 2017">

    <button id="btnResetFiltres">
    Netejar filtres
</button>

</div>  
</aside>

            <section id="results">

                <div id="results-header">

    <h2 id="numResultats"></h2>

</div>

                <div id="cards-container"></div>

            </section>

<aside id="fitxa-detall" class="ocult">
    <div id="fitxa-detall-content"></div>
</aside>

<div id="fitxa-mobile" class="ocult">

    <div id="fitxa-mobile-content"></div>

    <button id="tancarFitxaMobile">
        Tancar
    </button>

</div>

        </section>
        
    </main>

  <footer>

    <div class="footer-content">

        <div class="footer-info">

            <h3>Catàleg d'activitats foraescola</h3>

            <p>Ajuntament de Santa Perpètua de Mogoda</p>

            <p>Servei d'Acció Socioeducativa</p>

            <p>© 2026</p>

        </div>

        <div class="footer-logos">

            <img
                src="assets/logos/PEE.png"
                alt="Pla educatiu d'entorn"
                class="footer-logo">

            <img
                src="assets/logos/logo-DIBA.png"
                alt="Diputació de Barcelona"
                class="footer-logo">

            <img
                src="assets/logos/DeptEdu.png"
                alt="Departament d'Educació de la Generalitat de Catalunya"
                class="footer-logo">

        </div>

        <div class="footer-text">

            <h3>Contacte</h3>

            <a href="mailto:educacio@staperpetua.cat">
                educacio@staperpetua.cat
            </a>

        </div>

    </div>

</footer>

    <script src="js/cards.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
