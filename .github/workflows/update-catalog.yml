name: Update catalog

on:
  repository_dispatch:
    types: [update-catalog]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write catalog.json
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload.catalog) }}
        run: |
          mkdir -p data
          echo "$PAYLOAD" > data/catalog.json

      - name: Commit changes
        run: |
          git config user.name "catalog-bot"
          git config user.email "catalog-bot@github.com"

          git add data/catalog.json

          git diff --staged --quiet || git commit -m "Actualitza catalog.json"

      - name: Push changes
        run: |
          git push
